<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="card__img">
                <img src="./images/image-equilibrium.jpg" class="card__img__background">
                <img src="./images/icon-view.svg" class="card__img__view">
                <div class="card__img__foreground"></div>
            </div>
            <h1 class="card__title">Equilibrium #3429</h1>
            <p class="card__description">Our Equilibrium collection promotes balance and calm</p>
            <div class="info">
                <div class="info__crypto"><img src="./images/icon-ethereum.svg"><span>0.041 ETH</span></div>
                <div class="card__description info__date"><img src="./images/icon-clock.svg"><span>3 days left</span></div>
            </div>
            <div class="footer">
                <img src="./images/image-avatar.png" class="footer__avatar">
                <p class="card__description footer__description">
                    <span>Creation of </span><span>Jules Wyvern</span>
                </p>
            </div>
        </div>
    </main>

</body>
</html>
